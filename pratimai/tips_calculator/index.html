<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tips calculator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="calculator">
        <h1>Tip Calculator</h1>

        <div class="input-group">
            <label for="billAmount">Bill Amount</label>
            <input type="number" id="billAmount" placeholder="Įveskite sumą" value="0" />
        </div>

        <div class="input-group">
            <label for="tipRange">
                Tip Percentage:
                <span id="tipPercent">15%</span>
            </label>
            <input type="range" id="tipRange" min="0" max="30" value="15" />
        </div>

        <div class="result">
            <h3>Tip: <span id="tipAmount">$0.00</span></h3>
            <h3>Total: <span id="totalAmount">$0.00</span></h3>
        </div>

    </div>

    <script src="script.js" defer></script>
</body>

</html>
